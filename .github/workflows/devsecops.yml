name: DevSecOps Pipeline
on: [push, pull_request]
jobs:
 security-check:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4
 with:
 fetch-depth: 0
 - name: Scan for secrets (Gitleaks)
 uses: gitleaks/gitleaks-action@v2
 env:
 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 - name: Lint Code
 run: |
 # Python:
 # pip install flake8 && flake8 . --count --show-source --statistics
 # JavaScript / TypeScript:
 # npx eslint . --ext .js,.ts
 # Otro lenguaje:
 # Seleccionen el linter apropiado para su stack.
 #
 # Descomenten y adapten la línea correspondiente a su proyecto.
 echo "Reemplacen este echo con el comando de lint de su lenguaje"
